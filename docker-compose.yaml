version: '3.9'

services:

  # ── MySQL Database ────────────────────────────────────────────────────────────
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Chandran@2006
      MYSQL_DATABASE: tasknest
    ports:
      - '3306:3306'
    volumes:
      # Persist data across restarts
      - db_data:/var/lib/mysql
      # Auto-run schema on first boot
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pChandran@2006']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (Node.js / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Chandran@2006
      DB_NAME: tasknest
      JWT_SECRET: b1a0a9bfdc478262206371b38cc3cd9f6c2d58f8031099b07986eb661ecb6c1abda25e401e914e7f0411649c3e5149eec0e2ff0a86a24105d6d80a7e8315d9fb
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:5173
      ADMIN_SIGNUP_KEY: admin2026

  # ── Frontend (React / Vite preview) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      # vite.config.ts reads this at preview server start time to proxy /api
      VITE_API_TARGET: http://backend:8080

volumes:
  db_data:
